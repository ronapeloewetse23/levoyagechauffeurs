<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="navbar">

        <div class="logo">
            <img src="images/logo.png" alt="LE VOYAGE">
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Partner up</a></li>
            <li><a href="cars.html">Cars</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="contacts.html">Contact</a></li>
        </ul>

    </div>
</header>

<main>

<form action="payment.html">

    <h2>Book a Car</h2>

    <input type="text"
           placeholder="Name"
           required>

    <input type="email"
           placeholder="Email"
           required>

    <!-- CAR SELECTION -->
    <select required>
        <option value="">Select Car</option>
        <option>BMW-X5</option>
        <option>LC300</option>
        <option>BMW-340i</option>
        <option>GLE63S</option>
    </select>

    <!-- QUANTITY SECTION -->
    <label for="quantity">Number of Cars</label>

    <input type="number"
           id="quantity"
           min="1"
           max="10"
           value="1"
           required>

    <!-- RENTAL DATES -->
    <input type="date"
           placeholder="Starting Date"
           required>

    <input type="date"
           placeholder="Ending Date"
           required>

    <!-- SUBMIT BUTTON -->
    <button type="submit">
        Confirm Booking
    </button>

</form>

</main>

<footer class="footer">

    <div class="footer-container">



        <div class="footer-section">
            <h3>Contact</h3>

            <p>Email: levoyagechauffeurs@gmail.com</p>
            <p>Phone: +267 77 503 760</p>
        </div>

        <div class="footer-section">
            <h3>Follow Us</h3>

            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
                <a href="#">TikTok</a>
            </div>
        </div>

    </div>

    <div class="footer-bottom">
        DRIVEN BY EXCELLENCE
    </div>

</footer>
<script src="javascript.js"></script>

</body>
</html>
